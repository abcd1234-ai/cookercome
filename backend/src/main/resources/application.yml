# 应用名称
spring:
  application:
    name: cookercome-backend
  main:
    allow-circular-references: true
  
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://124.221.15.13:3306/cookercome?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
    username: cookercome
    password: 998877

  #redis配置
  redics:
      host: 124.221.15.13
      port: 6379
      password: 998877
      timeout: 3000
      database: 0
      pool:
          max-active: 10
          max-idle: 10
          max-wait: -1
          min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# 服务端口
server:
  port: 8080

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: cookerc0me2026secretkey!@#$%^
  expiration: 86400000

# 日志配置
logging:
  level:
    com.hs.backend: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

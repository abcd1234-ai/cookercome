spring.application.name=Backend

# MongoDB 配置
spring.data.mongodb.uri=mongodb://localhost:27017/cooker_platform
spring.data.mongodb.database=cooker_platform

# MySQL 配置（预留）
spring.datasource.url=jdbc:mysql://localhost:3306/cooker_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 服务器端口
server.port=8080

# 日志配置
logging.level.com.hs.backend=debug
